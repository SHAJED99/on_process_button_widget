name: on_process_button_widget
description: A highly customizable Flutter button with built-in loading animations and status feedback (Success/Error). Perfect for asynchronous operations and form submissions.
version: 2.0.12
homepage: https://github.com/SHAJED99/on_process_button_widget
license: BSD 3-Clause

screenshots:
  - description: 'All features of on_process_button_widget'
    path: screenshots/all.gif
  - description: 'Hover effects on on_process_button_widget'
    path: screenshots/hover.gif
  - description: 'Request status (success/error) feedback'
    path: screenshots/status.gif
  - description: 'Double process chaining'
    path: screenshots/double.gif
  - description: 'Custom styles and themes'
    path: screenshots/style.gif
  - description: 'Card mode usage'
    path: screenshots/card.gif

topics:
  - button
  - elevated-button
  - animated-button

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.16.0'

repository: https://github.com/SHAJED99/on_process_button_widget
issue_tracker: https://github.com/SHAJED99/on_process_button_widget/issues

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
